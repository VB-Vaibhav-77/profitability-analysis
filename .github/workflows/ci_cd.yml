name: Profitability Data Pipeline CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flake8

    - name: Code Quality Auditing (Linting)
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Unit Tests with pytest
      run: |
        python -m pytest tests/ -v

    - name: Execute Full ETL Ingestion Pipeline
      run: |
        python main.py

    - name: Upload Clean Tables to Google BigQuery Cloud
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        if [ -n "$GCP_CREDENTIALS" ]; then
          python run_bigquery_analysis.py
        else
          echo "GCP credentials not configured. Skipping BigQuery loading."
        fi
